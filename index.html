<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Avinor flydata</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9c9a94;
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: #b5d4f4;
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --warning-bg: #faeeda;
    --warning-text: #633806;
    --danger-bg: #fcebeb;
    --danger-text: #791f1f;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252522;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #e8e6df;
      --text-muted: #9c9a92;
      --text-hint: #6b6b67;
      --info-bg: #0c447c;
      --info-text: #b5d4f4;
      --info-border: #185fa5;
      --success-bg: #27500a;
      --success-text: #c0dd97;
      --warning-bg: #633806;
      --warning-text: #fac775;
      --danger-bg: #791f1f;
      --danger-text: #f7c1c1;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
  }

  .app { max-width: 480px; margin: 0 auto; }

  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.25rem 0.75rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 0.75rem;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .controls select {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .search-input {
    flex: 1;
    padding: 8px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }

  .search-input::placeholder { color: var(--text-hint); }

  .search-clear {
    padding: 8px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: none;
  }

  .dir-toggle {
    display: flex;
    gap: 4px;
  }

  .dir-btn {
    padding: 8px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .dir-btn.active {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: var(--info-border);
  }

  .content { padding: 1rem 1.25rem; }

  .now-marker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0.5rem 0;
    scroll-margin-top: 80px;
  }

  .now-marker-line {
    flex: 1;
    height: 1px;
    background: var(--info-border);
  }

  .now-marker-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--info-text);
    background: var(--info-bg);
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .history-toggle {
    text-align: center;
    margin-bottom: 0.75rem;
  }

  .history-btn {
    font-size: 13px;
    color: var(--info-text);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .flight-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0.875rem 1rem;
    margin-bottom: 0.625rem;
  }

  .flight-card.past { opacity: 0.5; }

  .flight-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1px;
  }

  .flight-id { font-size: 15px; font-weight: 500; }

  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: var(--radius);
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge-arrived, .badge-departed { background: var(--success-bg); color: var(--success-text); }
  .badge-cancelled { background: var(--danger-bg); color: var(--danger-text); }
  .badge-delayed { background: var(--warning-bg); color: var(--warning-text); }
  .badge-info { background: var(--info-bg); color: var(--info-text); }

  .airline-name {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .time-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 5px;
  }

  .sched-time { font-size: 20px; font-weight: 500; }
  .est-time { font-size: 13px; color: var(--warning-text); }
  .time-sep { font-size: 12px; color: var(--text-hint); }

  .dest-name { font-size: 14px; color: var(--text); margin-bottom: 2px; }
  .dest-code { color: var(--text-muted); font-size: 13px; }

  .via-row { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
  .dom-row { font-size: 12px; color: var(--text-hint); }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px solid var(--border);
  }

  .meta { font-size: 12px; color: var(--text-muted); }
  .meta strong { color: var(--text); font-weight: 500; }

  .flight-card.domestic { cursor: pointer; }
  .flight-card.domestic:active { opacity: 0.85; }

  .expand-hint {
    font-size: 11px;
    color: var(--info-text);
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .expand-hint svg { transition: transform 0.2s; }
  .expand-hint.open svg { transform: rotate(180deg); }

  .dest-detail {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }

  .dest-detail-header {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-hint);
    margin-bottom: 6px;
  }

  .dest-detail .time-row { margin-bottom: 3px; }
  .dest-detail .sched-time { font-size: 17px; }

  .dest-loading {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mini-spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 1.5px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  .empty, .loading-msg {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }

  .error-msg {
    background: var(--danger-bg);
    color: var(--danger-text);
    border: 0.5px solid var(--danger-text);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .attribution {
    text-align: center;
    padding: 1.5rem 0 2rem;
    font-size: 12px;
    color: var(--text-hint);
  }

  .attribution a { color: var(--info-text); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✈ Avinor flydata</h1>
    <div class="controls">
      <select id="airportSel" onchange="reload()">
        <option value="OSL">Oslo Lufthavn (OSL)</option>
        <option value="BGO">Bergen (BGO)</option>
        <option value="SVG">Stavanger (SVG)</option>
        <option value="TRD">Trondheim (TRD)</option>
        <option value="TOS">Tromsø (TOS)</option>
        <option value="BOO">Bodø (BOO)</option>
        <option value="AES">Ålesund (AES)</option>
        <option value="KRS">Kristiansand (KRS)</option>
        <option value="TRF">Sandefjord Torp (TRF)</option>
        <option value="HAU">Haugesund (HAU)</option>
        <option value="MOL">Molde (MOL)</option>
        <option value="ALF">Alta (ALF)</option>
        <option value="KKN">Kirkenes (KKN)</option>
        <option value="LKL">Lakselv (LKL)</option>
        <option value="EVE">Evenes / Harstad-Narvik (EVE)</option>
        <option value="ANX">Andøya (ANX)</option>
        <option value="BNN">Brønnøysund (BNN)</option>
        <option value="FDE">Førde (FDE)</option>
        <option value="HFT">Hammerfest (HFT)</option>
        <option value="HOV">Ørsta-Volda (HOV)</option>
        <option value="HVG">Honningsvåg (HVG)</option>
        <option value="LYR">Longyearbyen (LYR)</option>
        <option value="MEH">Mehamn (MEH)</option>
        <option value="MJF">Mosjøen (MJF)</option>
        <option value="MQN">Mo i Rana (MQN)</option>
        <option value="NTB">Notodden (NTB)</option>
        <option value="OSY">Namsos (OSY)</option>
        <option value="RRS">Røros (RRS)</option>
        <option value="SDN">Sandane (SDN)</option>
        <option value="SKE">Skien (SKE)</option>
        <option value="SKN">Stokmarknes (SKN)</option>
        <option value="SOG">Sogndal (SOG)</option>
        <option value="SOJ">Sørkjosen (SOJ)</option>
        <option value="SSJ">Sandnessjøen (SSJ)</option>
        <option value="SVJ">Svolvær (SVJ)</option>
        <option value="VAW">Vardø (VAW)</option>
        <option value="VDB">Fagernes (VDB)</option>
        <option value="VRY">Værøy (VRY)</option>
      </select>
      <div class="dir-toggle">
        <button class="dir-btn active" id="btn-D" onclick="setDir('D')">Avg</button>
        <button class="dir-btn" id="btn-A" onclick="setDir('A')">Ank</button>
      </div>
    </div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="search" placeholder="Søk flightnr, destinasjon, selskap…" oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">Tøm</button>
    </div>
  </div>

  <div class="content">
    <div id="historyToggle" class="history-toggle" style="display:none">
      <button class="history-btn" onclick="toggleHistory()">
        <span id="historyBtnTxt">Vis tidligere avganger</span>
      </button>
    </div>
    <div id="flightResults">
      <div class="loading-msg"><span class="spinner"></span>Henter flydata…</div>
    </div>
    <div class="attribution">
      <a href="https://www.avinor.no" target="_blank">Flydata fra Avinor</a>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://avino-proxy.batil-kjekken.workers.dev';

let currentDir = 'D';
let showHistory = false;
let searchQuery = '';
let airportNames = {};
let airlineNames = {};
let allFlights = [];
let nowMarkerIndex = -1;

async function boot() {
  await Promise.all([loadAirportNames(), loadAirlineNames()]);
  await fetchFlights();
}

async function loadAirportNames() {
  try {
    const xml = await fetchXML('/airportNames/v1.0?shortname=Y');
    xml.querySelectorAll('airportName').forEach(a => {
      const code = a.getAttribute('code') || '';
      const name = a.getAttribute('name') || '';
      if (code && name) airportNames[code] = name;
    });
  } catch(e) {}
}

async function loadAirlineNames() {
  try {
    const xml = await fetchXML('/airlineNames/v1.0');
    xml.querySelectorAll('airlineName').forEach(a => {
      const code = a.getAttribute('code') || '';
      const name = a.getAttribute('name') || '';
      if (code && name) airlineNames[code] = name;
    });
  } catch(e) {}
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  renderFlights();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderFlights();
}

function setDir(dir) {
  currentDir = dir;
  document.getElementById('btn-D').classList.toggle('active', dir === 'D');
  document.getElementById('btn-A').classList.toggle('active', dir === 'A');
  document.getElementById('historyBtnTxt').textContent =
    dir === 'D' ? 'Vis tidligere avganger' : 'Vis tidligere ankomster';
  showHistory = false;
  clearSearch();
  fetchFlights();
}

function reload() {
  showHistory = false;
  clearSearch();
  fetchFlights();
}

function toggleHistory() {
  showHistory = !showHistory;
  document.getElementById('historyBtnTxt').textContent = showHistory
    ? (currentDir === 'D' ? 'Skjul tidligere avganger' : 'Skjul tidligere ankomster')
    : (currentDir === 'D' ? 'Vis tidligere avganger' : 'Vis tidligere ankomster');
  renderFlights();
  if (!showHistory) scrollToNow();
}

async function fetchXML(path) {
  const res = await fetch(PROXY + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buffer = await res.arrayBuffer();
  // Decode as ISO-8859-1 (latin1) which is what Avinor uses
  const txt = new TextDecoder('iso-8859-1').decode(buffer);
  // Tell the XML parser it's now UTF-8 (since JS strings are unicode)
  const fixed = txt.replace(/encoding="[^"]+"/i, 'encoding="UTF-8"');
  return new DOMParser().parseFromString(fixed, 'text/xml');
}

async function fetchFlights() {
  const airport = document.getElementById('airportSel').value;
  const el = document.getElementById('flightResults');
  el.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Henter flydata…</div>';
  document.getElementById('historyToggle').style.display = 'none';

  try {
    const qs = `/XmlFeed/v1.0?airport=${airport}&TimeFrom=3&TimeTo=24&direction=${currentDir}`;
    const xml = await fetchXML(qs);

    allFlights = [...xml.querySelectorAll('flight')].sort((a, b) => {
      const ta = new Date(a.querySelector('schedule_time')?.textContent || 0).getTime();
      const tb = new Date(b.querySelector('schedule_time')?.textContent || 0).getTime();
      return ta - tb;
    });

    if (!allFlights.length) {
      el.innerHTML = '<div class="empty">Ingen fly funnet</div>';
      return;
    }

    const now = Date.now();
    nowMarkerIndex = allFlights.findIndex(f => {
      const t = new Date(f.querySelector('schedule_time')?.textContent || 0).getTime();
      return t >= now;
    });
    if (nowMarkerIndex === -1) nowMarkerIndex = allFlights.length;

    document.getElementById('historyToggle').style.display =
      nowMarkerIndex > 0 ? 'block' : 'none';

    renderFlights();
    setTimeout(scrollToNow, 80);

  } catch(e) {
    el.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

function renderFlights() {
  const el = document.getElementById('flightResults');
  const now = Date.now();
  let html = '';

  allFlights.forEach((f, i) => {
    const schedRaw = f.querySelector('schedule_time')?.textContent || '';
    const schedMs  = new Date(schedRaw).getTime();
    const isPast   = schedMs < now;

    if (isPast && !showHistory) return;

    // Search filter
    if (searchQuery) {
      const destName = airportNames[f.querySelector('airport')?.textContent || ''] || '';
      const airName  = airlineNames[f.querySelector('airline')?.textContent || ''] || '';
      const haystack = [
        f.querySelector('flight_id')?.textContent || '',
        f.querySelector('airport')?.textContent || '',
        destName,
        f.querySelector('airline')?.textContent || '',
        airName,
        f.querySelector('via_airport')?.textContent || '',
      ].join(' ').toLowerCase();
      if (!haystack.includes(searchQuery)) return;
    }

    if (i === nowMarkerIndex) {
      html += `<div class="now-marker" id="now-marker">
        <div class="now-marker-line"></div>
        <div class="now-marker-label">Nå — ${new Date().toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'})}</div>
        <div class="now-marker-line"></div>
      </div>`;
    }

    const id       = f.querySelector('flight_id')?.textContent || '';
    const sched    = utcToLocal(schedRaw);
    const destCode = f.querySelector('airport')?.textContent || '';
    const destName = airportNames[destCode] || destCode;
    const airCode  = f.querySelector('airline')?.textContent || '';
    const airName  = airlineNames[airCode] || airCode;
    const statusEl = f.querySelector('status');
    const scode    = statusEl?.getAttribute('code') || '';
    const stime    = statusEl?.getAttribute('time') ? utcToLocal(statusEl.getAttribute('time')) : '';
    const gate     = f.querySelector('gate')?.textContent || '';
    const belt     = f.querySelector('belt_number')?.textContent || '';
    const checkin  = f.querySelector('check_in')?.textContent || '';
    const viaRaw   = f.querySelector('via_airport')?.textContent || '';
    const domInt   = f.querySelector('dom_int')?.textContent || '';
    const si       = scode ? statusInfo(scode) : null;

    const viaNames = viaRaw
      ? viaRaw.split(',').map(c => airportNames[c.trim()] || c.trim()).join(' → ')
      : '';

    const hasMeta = gate || checkin || belt;
    const isDomestic = domInt === 'D';
    const uid = f.getAttribute('uniqueID') || id;

    html += `<div class="flight-card${isPast ? ' past' : ''}${isDomestic ? ' domestic' : ''}" id="card-${uid}"${isDomestic ? ` onclick="toggleDest('${uid}','${id}','${destCode}','${schedRaw}')"` : ''}>
      <div class="flight-top">
        <div class="flight-id">${id}</div>
        ${si ? `<span class="badge ${si.cls}">${si.label}</span>` : ''}
      </div>
      <div class="airline-name">${airName}</div>
      <div class="time-row">
        <span class="sched-time">${sched}</span>
        ${stime && stime !== sched ? `<span class="time-sep">→</span><span class="est-time">${stime}</span>` : ''}
      </div>
      <div class="dest-name">${destName} <span class="dest-code">(${destCode})</span></div>
      ${viaNames ? `<div class="via-row">via ${viaNames}</div>` : ''}
      <div class="dom-row">${domLabel(domInt)}</div>
      ${hasMeta ? `<div class="meta-row">
        ${gate    ? `<span class="meta">Gate <strong>${gate}</strong></span>` : ''}
        ${checkin ? `<span class="meta">Innsjekk <strong>${checkin}</strong></span>` : ''}
        ${belt    ? `<span class="meta">Bagasjebånd <strong>${belt}</strong></span>` : ''}
      </div>` : ''}
      ${isDomestic ? `<div class="expand-hint" id="hint-${uid}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${currentDir === 'D' ? 'Vis ankomstinfo' : 'Vis avganginfo'}
      </div>
      <div class="dest-detail" id="dest-${uid}" style="display:none"></div>` : ''}
    </div>`;
  });

  if (!html) {
    el.innerHTML = '<div class="empty">Ingen fly i valgt tidsrom</div>';
    return;
  }

  el.innerHTML = html;
}

function scrollToNow() {
  const marker = document.getElementById('now-marker');
  if (marker) marker.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function utcToLocal(utc) {
  if (!utc) return '—';
  return new Date(utc).toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });
}

function statusInfo(code) {
  return {
    A: { label: 'Landet',     cls: 'badge-arrived' },
    D: { label: 'Avreist',    cls: 'badge-departed' },
    C: { label: 'Kansellert', cls: 'badge-cancelled' },
    E: { label: 'Ny tid',     cls: 'badge-delayed' },
    N: { label: 'Ny info',    cls: 'badge-info' },
  }[code] || { label: code, cls: 'badge-info' };
}

function domLabel(v) {
  return { D: 'Innenriks', I: 'Internasjonal', S: 'Schengen' }[v] || v || '';
}

// ── Destination detail (lazy, cached) ────────────────────────────────────
const destCache = {};

async function toggleDest(uid, flightId, destCode, schedRaw) {
  const panel = document.getElementById(`dest-${uid}`);
  const hint  = document.getElementById(`hint-${uid}`);
  if (!panel) return;

  const isOpen = panel.style.display !== 'none';

  if (isOpen) {
    panel.style.display = 'none';
    hint.classList.remove('open');
    hint.querySelector('span') && (hint.querySelector('span').textContent =
      currentDir === 'D' ? 'Vis ankomstinfo' : 'Vis avganginfo');
    return;
  }

  panel.style.display = 'block';
  hint.classList.add('open');
  hint.querySelector('span') && (hint.querySelector('span').textContent =
    currentDir === 'D' ? 'Skjul ankomstinfo' : 'Skjul avganginfo');

  if (destCache[uid]) {
    panel.innerHTML = destCache[uid];
    return;
  }

  panel.innerHTML = '<div class="dest-loading"><span class="mini-spinner"></span>Henter…</div>';

  try {
    // For a departure we want the arrival at dest; for arrival we want departure from dest
    const otherDir = currentDir === 'D' ? 'A' : 'D';
    const qs = `/XmlFeed/v1.0?airport=${destCode}&TimeFrom=4&TimeTo=25&direction=${otherDir}`;
    const xml = await fetchXML(qs);
    const flights = [...xml.querySelectorAll('flight')];

    // Match by flight_id (strip spaces for safety)
    const match = flights.find(f =>
      (f.querySelector('flight_id')?.textContent || '').trim() === flightId.trim()
    );

    if (!match) {
      destCache[uid] = `<div style="font-size:12px;color:var(--text-muted)">Ingen data funnet for ${destCode}</div>`;
      panel.innerHTML = destCache[uid];
      return;
    }

    const destAirportCode = document.getElementById('airportSel').value;
    const destAirportName = airportNames[destCode] || destCode;
    const otherSched  = utcToLocal(match.querySelector('schedule_time')?.textContent);
    const otherStatus = match.querySelector('status');
    const otherScode  = otherStatus?.getAttribute('code') || '';
    const otherStime  = otherStatus?.getAttribute('time') ? utcToLocal(otherStatus.getAttribute('time')) : '';
    const otherGate   = match.querySelector('gate')?.textContent || '';
    const otherBelt   = match.querySelector('belt_number')?.textContent || '';
    const otherCheckin= match.querySelector('check_in')?.textContent || '';
    const otherSi     = otherScode ? statusInfo(otherScode) : null;
    const hasMeta     = otherGate || otherBelt || otherCheckin;
    const label       = currentDir === 'D' ? `Ankomst ${destAirportName}` : `Avgang fra ${destAirportName}`;

    let html = `<div class="dest-detail-header">${label}</div>`;
    html += `<div class="time-row">
      <span class="sched-time">${otherSched}</span>
      ${otherStime && otherStime !== otherSched ? `<span class="time-sep">→</span><span class="est-time">${otherStime}</span>` : ''}
      ${otherSi ? `<span class="badge ${otherSi.cls}" style="margin-left:4px">${otherSi.label}</span>` : ''}
    </div>`;
    if (hasMeta) {
      html += `<div class="meta-row" style="border-top:none;padding-top:0;margin-top:4px">
        ${otherGate    ? `<span class="meta">Gate <strong>${otherGate}</strong></span>` : ''}
        ${otherCheckin ? `<span class="meta">Innsjekk <strong>${otherCheckin}</strong></span>` : ''}
        ${otherBelt    ? `<span class="meta">Bagasjebånd <strong>${otherBelt}</strong></span>` : ''}
      </div>`;
    }

    destCache[uid] = html;
    panel.innerHTML = html;

  } catch(e) {
    panel.innerHTML = `<div style="font-size:12px;color:var(--danger-text)">Kunne ikke hente data</div>`;
  }
}

boot();
</script>
</body>
</html>
