<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flytider</title>
<meta name="apple-mobile-web-app-title" content="Flytider">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#185fa5">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23185fa5'/%3E%3Ctext y='75' x='50' text-anchor='middle' font-size='65' fill='white'%3E%E2%9C%88%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" id="apple-touch-icon">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9c9a94;
    --info-bg: #deeefb;
    --info-text: #0c447c;
    --info-border: #9dc8f0;
    --success-bg: #e0f2d4;
    --success-text: #1e4a08;
    --warning-bg: #fef0d0;
    --warning-text: #5a3200;
    --danger-bg: #fde8e8;
    --danger-text: #6e1a1a;
    --accent: #185fa5;
    --accent-light: #deeefb;
    --radius: 8px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #13151a;
      --surface: #1e2128;
      --border: rgba(255,255,255,0.09);
      --border-strong: rgba(255,255,255,0.18);
      --text: #e8e6df;
      --text-muted: #9c9a92;
      --text-hint: #6b6b67;
      --info-bg: #0d3560;
      --info-text: #8ec8f8;
      --info-border: #185fa5;
      --success-bg: #1a3d08;
      --success-text: #a8d878;
      --warning-bg: #4a2800;
      --warning-text: #f8c060;
      --danger-bg: #4a0f0f;
      --danger-text: #f89090;
      --accent: #2878c8;
      --accent-light: #0d3560;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
  }

  .app { max-width: 480px; margin: 0 auto; }

  .header {
    background: var(--accent);
    border-bottom: none;
    padding: 1rem 1.25rem 0.75rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.3px;
  }

  .header h1 .logo-icon {
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .controls select {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    font-size: 14px;
  }

  .controls select option {
    background: var(--surface);
    color: var(--text);
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .search-input {
    flex: 1;
    padding: 8px 10px;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.15);
    color: #ffffff;
    font-size: 14px;
  }

  .search-input::placeholder { color: rgba(255,255,255,0.55); }

  .search-clear {
    padding: 8px 12px;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    cursor: pointer;
    display: none;
  }

  .dir-toggle {
    display: flex;
    gap: 4px;
  }

  .dir-btn {
    padding: 8px 14px;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .dir-btn.active {
    background: #ffffff;
    color: var(--accent);
    border-color: #ffffff;
  }

  .content { padding: 1rem 1.25rem; }

  .now-marker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0.5rem 0;
    scroll-margin-top: 80px;
  }

  .now-marker-line {
    flex: 1;
    height: 1.5px;
    background: var(--accent);
    opacity: 0.4;
  }

  .now-marker-label {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .history-toggle {
    text-align: center;
    margin-bottom: 0.75rem;
  }

  .history-btn {
    font-size: 13px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .flight-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0.875rem 1rem;
    margin-bottom: 0.625rem;
  }

  .flight-card.past { border-left: 3px solid var(--border-strong); }

  .flight-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .flight-top-left { display: flex; align-items: center; gap: 8px; }
  .flight-id { font-size: 15px; font-weight: 500; }
  .airline-chip {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 99px;
    border: 0.5px solid var(--border);
  }

  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: var(--radius);
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge-arrived, .badge-departed { background: var(--success-bg); color: var(--success-text); }
  .badge-cancelled { background: var(--danger-bg); color: var(--danger-text); }
  .badge-delayed { background: var(--warning-bg); color: var(--warning-text); }
  .badge-info { background: var(--info-bg); color: var(--info-text); }

  /* Fra/til rader */
  .route-rows { display: flex; flex-direction: column; gap: 4px; }

  .route-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .route-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .route-icon-dep {
    background: var(--accent);
    color: #fff;
  }

  .route-icon-arr {
    background: var(--bg);
    border: 0.5px solid var(--border-strong);
    color: var(--text-muted);
  }

  .route-time {
    font-size: 18px;
    font-weight: 500;
    min-width: 48px;
    flex-shrink: 0;
  }

  .route-time-struck {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-hint);
    text-decoration: line-through;
    margin-right: 2px;
  }

  .route-airport {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .route-airport-code {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 3px;
  }

  .route-meta {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .route-meta-item {
    font-size: 11px;
    color: var(--text-muted);
  }

  .route-meta-item strong {
    color: var(--text);
    font-weight: 500;
  }

  .route-connector {
    display: flex;
    align-items: center;
    padding: 0 0 0 9px;
    height: 6px;
  }

  .route-connector-line {
    width: 1px;
    height: 6px;
    background: var(--border-strong);
    margin-left: 1px;
  }

  .via-row { font-size: 11px; color: var(--text-muted); margin: 2px 0 0 32px; }

  /* Auto-expanded data panel */
  .auto-panel {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px solid var(--border);
    min-height: 20px;
  }

  .auto-panel.loading { opacity: 0.5; }

  .expand-section-title {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-hint);
    margin: 8px 0 5px;
  }

  .expand-section-title:first-child { margin-top: 0; }

  .live-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  .live-cell {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 7px 9px;
  }

  .live-cell-label { font-size: 10px; color: var(--text-hint); margin-bottom: 1px; }
  .live-cell-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .live-cell-unit { font-size: 10px; color: var(--text-muted); margin-left: 2px; }

  .onground-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px 9px;
    margin-bottom: 4px;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #4caf50; }
  .dot-gray  { background: var(--text-hint); }

  .progress-wrap { margin-top: 6px; }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .progress-airport { max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-track {
    position: relative;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    opacity: 0.5;
    border-radius: 99px;
  }
  .progress-plane {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    line-height: 1;
  }
  .progress-pct { font-size: 11px; color: var(--text-muted); text-align: center; }

  .empty, .loading-msg {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }

  .error-msg {
    background: var(--danger-bg);
    color: var(--danger-text);
    border: 0.5px solid var(--danger-text);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .attribution {
    text-align: center;
    padding: 1.5rem 0 2rem;
    font-size: 12px;
    color: var(--text-hint);
  }

  .attribution a { color: var(--info-text); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .mini-spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 1.5px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>

        <option value="SVG">Stavanger (SVG)</option>
        <option value="TRD">Trondheim (TRD)</option>
        <option value="TOS">Tromsø (TOS)</option>
        <option value="BOO">Bodø (BOO)</option>
        <option value="AES">Ålesund (AES)</option>
        <option value="KRS">Kristiansand (KRS)</option>
        <option value="TRF">Sandefjord Torp (TRF)</option>
        <option value="HAU">Haugesund (HAU)</option>
        <option value="MOL">Molde (MOL)</option>
        <option value="ALF">Alta (ALF)</option>

        <option value="ANX">Andøya (ANX)</option>
        <option value="BNN">Brønnøysund (BNN)</option>
        <option value="FDE">Førde (FDE)</option>
        <option value="HFT">Hammerfest (HFT)</option>
        <option value="HOV">Ørsta-Volda (HOV)</option>

        <option value="LYR">Longyearbyen (LYR)</option>

        <option value="MQN">Mo i Rana (MQN)</option>

      <div class="dir-toggle">

    <div class="search-row">
      <input class="search-input" id="searchInput" type="search" placeholder="Søk flightnr, destinasjon, selskap…" oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">

  <div class="content">
    <div id="historyToggle" class="history-toggle" style="display:none">
      <button class="history-btn" onclick="toggleHistory()">
        <span id="historyBtnTxt">Vis tidligere avganger</span>
      </button>

    <div id="flightResults">
      <div class="loading-msg"><span class="spinner"></span>Henter flydata…</div>
    </div>
    <div class="attribution">
      <a href="https://www.avinor.no" target="_blank">Flydata fra Avinor</a>

<script>
const PROXY = 'https://avino-proxy.batil-kjekken.workers.dev';

let currentDir = 'D';
let showHistory = false;
let searchQuery = '';
let airportNames = {};
let airlineNames = {};
let allFlights = [];
let nowMarkerIndex = -1;

async function boot() {
  await Promise.all([loadAirportNames(), loadAirlineNames()]);
  await fetchFlights();
}

async function loadAirportNames() {
  try {
    const xml = await fetchXML('/airportNames/v1.0?shortname=Y');
    xml.querySelectorAll('airportName').forEach(a => {
      const code = a.getAttribute('code') || '';
      const name = a.getAttribute('name') || '';
      if (code && name) airportNames[code] = name;
    });
  } catch(e) {}
}

async function loadAirlineNames() {
  try {
    const xml = await fetchXML('/airlineNames/v1.0');
    xml.querySelectorAll('airlineName').forEach(a => {
      const code = a.getAttribute('code') || '';
      const name = a.getAttribute('name') || '';
      if (code && name) airlineNames[code] = name;
    });
  } catch(e) {}
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  renderFlights();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderFlights();
}

function setDir(dir) {
  currentDir = dir;
  document.getElementById('btn-D').classList.toggle('active', dir === 'D');
  document.getElementById('btn-A').classList.toggle('active', dir === 'A');
  document.getElementById('historyBtnTxt').textContent =
    dir === 'D' ? 'Vis tidligere avganger' : 'Vis tidligere ankomster';
  showHistory = false;
  clearSearch();
  fetchFlights();
}

function reload() {
  showHistory = false;
  clearSearch();
  fetchFlights();
}

function toggleHistory() {
  showHistory = !showHistory;
  document.getElementById('historyBtnTxt').textContent = showHistory
    ? (currentDir === 'D' ? 'Skjul tidligere avganger' : 'Skjul tidligere ankomster')
    : (currentDir === 'D' ? 'Vis tidligere avganger' : 'Vis tidligere ankomster');

  if (showHistory) {
    // Finn nå-markørens posisjon før re-render
    const marker = document.getElementById('now-marker');
    const markerTop = marker ? marker.getBoundingClientRect().top : null;
    renderFlights();
    // Etter re-render: finn markøren igjen og juster scroll slik at den er på samme sted
    const newMarker = document.getElementById('now-marker');
    if (newMarker && markerTop !== null) {
      const newMarkerTop = newMarker.getBoundingClientRect().top;
      window.scrollBy({ top: newMarkerTop - markerTop, behavior: 'instant' });
    }
  } else {
    renderFlights();
    scrollToNow();
  }
}

async function fetchXML(path) {
  const res = await fetch(PROXY + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buffer = await res.arrayBuffer();
  // Decode as ISO-8859-1 (latin1) which is what Avinor uses
  const txt = new TextDecoder('iso-8859-1').decode(buffer);
  // Tell the XML parser it's now UTF-8 (since JS strings are unicode)
  const fixed = txt.replace(/encoding="[^"]+"/i, 'encoding="UTF-8"');
  return new DOMParser().parseFromString(fixed, 'text/xml');
}

async function fetchFlights() {
  const airport = document.getElementById('airportSel').value;
  const el = document.getElementById('flightResults');
  el.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Henter flydata…</div>';
  document.getElementById('historyToggle').style.display = 'none';

  try {
    const qs = `/XmlFeed/v1.0?airport=${airport}&TimeFrom=3&TimeTo=24&direction=${currentDir}`;
    const xml = await fetchXML(qs);

    allFlights = [...xml.querySelectorAll('flight')].sort((a, b) => {
      const ta = new Date(a.querySelector('schedule_time')?.textContent || 0).getTime();
      const tb = new Date(b.querySelector('schedule_time')?.textContent || 0).getTime();
      return ta - tb;
    });

    if (!allFlights.length) {
      el.innerHTML = '<div class="empty">Ingen fly funnet</div>';
      return;
    }

    const now = Date.now();
    nowMarkerIndex = allFlights.findIndex(f => {
      const t = new Date(f.querySelector('schedule_time')?.textContent || 0).getTime();
      return t >= now;
    });
    if (nowMarkerIndex === -1) nowMarkerIndex = allFlights.length;

    document.getElementById('historyToggle').style.display =
      nowMarkerIndex > 0 ? 'block' : 'none';

    renderFlights();
    setTimeout(scrollToNow, 80);

  } catch(e) {
    el.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

function renderFlights() {
  loadedCards.clear();
  const el = document.getElementById('flightResults');
  const now = Date.now();
  let html = '';

  allFlights.forEach((f, i) => {
    const schedRaw = f.querySelector('schedule_time')?.textContent || '';
    const schedMs  = new Date(schedRaw).getTime();
    const isPast   = schedMs < now;

    if (isPast && !showHistory) return;

    // Search filter
    if (searchQuery) {
      const destName = airportNames[f.querySelector('airport')?.textContent || ''] || '';
      const airName  = airlineNames[f.querySelector('airline')?.textContent || ''] || '';
      const haystack = [
        f.querySelector('flight_id')?.textContent || '',
        f.querySelector('airport')?.textContent || '',
        destName,
        f.querySelector('airline')?.textContent || '',
        airName,
        f.querySelector('via_airport')?.textContent || '',
      ].join(' ').toLowerCase();
      if (!haystack.includes(searchQuery)) return;
    }

    if (i === nowMarkerIndex) {
      html += `<div class="now-marker" id="now-marker">
        <div class="now-marker-line"></div>
        <div class="now-marker-label">Nå — ${new Date().toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'})}</div>
        <div class="now-marker-line"></div>
      </div>`;
    }

    const id       = f.querySelector('flight_id')?.textContent || '';
    const sched    = utcToLocal(schedRaw);
    const destCode = f.querySelector('airport')?.textContent || '';
    const destName = airportNames[destCode] || destCode;
    const airCode  = f.querySelector('airline')?.textContent || '';
    const airName  = airlineNames[airCode] || airCode;
    const statusEl = f.querySelector('status');
    const scode    = statusEl?.getAttribute('code') || '';
    const stime    = statusEl?.getAttribute('time') ? utcToLocal(statusEl.getAttribute('time')) : '';
    const gate     = f.querySelector('gate')?.textContent || '';
    const belt     = f.querySelector('belt_number')?.textContent || '';
    const checkin  = f.querySelector('check_in')?.textContent || '';
    const viaRaw   = f.querySelector('via_airport')?.textContent || '';
    const domInt   = f.querySelector('dom_int')?.textContent || '';
    const si       = scode ? statusInfo(scode) : null;

    const viaNames = viaRaw
      ? viaRaw.split(',').map(c => airportNames[c.trim()] || c.trim()).join(' → ')
      : '';

    const hasMeta = gate || checkin || belt;
    const isDomestic = domInt === 'D';
    const uid = f.getAttribute('uniqueID') || id;
    const actualDepRaw = (scode === 'D' && statusEl?.getAttribute('time'))
      ? statusEl.getAttribute('time') : schedRaw;

    const homeCode = document.getElementById('airportSel').value;
    const homeName = airportNames[homeCode] || homeCode;
    const fromCode = currentDir === 'D' ? homeCode : destCode;
    const toCode   = currentDir === 'D' ? destCode : homeCode;
    const fromName = currentDir === 'D' ? homeName : destName;
    const toName   = currentDir === 'D' ? destName : homeName;

    // Avgangslinje: viser tidspunkt + flyplasskode/meta
    const depTimeHtml = stime && stime !== sched
      ? `<span class="route-time-struck">${sched}</span><span class="route-time">${stime}</span>`
      : `<span class="route-time">${sched}</span>`;

    html += `<div class="flight-card${isPast ? ' past' : ''}" id="card-${uid}"
        data-uid="${uid}" data-flight="${id}" data-from="${fromCode}" data-to="${toCode}"
        data-sched="${schedRaw}" data-dep="${actualDepRaw}" data-dom="${domInt}">
      <div class="flight-top">
        <div class="flight-top-left">
          <span class="flight-id">${id}</span>
          <span class="airline-chip">${airName}</span>
        </div>
        ${si ? `<span class="badge ${si.cls}">${si.label}</span>` : ''}
      </div>
      <div class="route-rows">
        <div class="route-row">
          <div class="route-icon route-icon-dep">▶</div>
          ${depTimeHtml}
          <div class="route-airport">${fromName} <span class="route-airport-code">(${fromCode})</span></div>
          <div class="route-meta">
            ${gate    ? `<span class="route-meta-item">Gate <strong>${gate}</strong></span>` : ''}
            ${checkin ? `<span class="route-meta-item">Innsjekk <strong>${checkin}</strong></span>` : ''}
          </div>
        </div>
        <div class="route-connector"><div class="route-connector-line"></div></div>
        <div class="route-row">
          <div class="route-icon route-icon-arr">▼</div>
          <span class="route-time" id="arr-time-${uid}">—</span>
          <div class="route-airport">${toName} <span class="route-airport-code">(${toCode})</span></div>
          <div class="route-meta">
            ${belt ? `<span class="route-meta-item">Bånd <strong>${belt}</strong></span>` : ''}
          </div>
        </div>
      </div>
      ${viaNames ? `<div class="via-row">via ${viaNames}</div>` : ''}
      <div class="auto-panel" id="auto-${uid}"></div>
    </div>`;
  });

  if (!html) {
    el.innerHTML = '<div class="empty">Ingen fly i valgt tidsrom</div>';
    return;
  }

  el.innerHTML = html;
  setupObserver();
}

function scrollToNow() {
  const marker = document.getElementById('now-marker');
  if (marker) marker.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function utcToLocal(utc) {
  if (!utc) return '—';
  return new Date(utc).toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });
}

function statusInfo(code) {
  return {
    A: { label: 'Landet',     cls: 'badge-arrived' },
    D: { label: 'Avreist',    cls: 'badge-departed' },
    C: { label: 'Kansellert', cls: 'badge-cancelled' },
    E: { label: 'Ny tid',     cls: 'badge-delayed' },
    N: { label: 'Ny info',    cls: 'badge-info' },
  }[code] || { label: code, cls: 'badge-info' };
}

// ── Auto-load card data via IntersectionObserver ──────────────────────────
const loadedCards = new Set();
let adsbQueue = Promise.resolve();
let observer;

function setupObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const card = entry.target;
      const uid = card.dataset.uid;
      if (!uid || loadedCards.has(uid)) return;
      loadedCards.add(uid);
      observer.unobserve(card);
      loadCardData(card);
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('.flight-card[data-uid]').forEach(card => {
    observer.observe(card);
  });
}

async function loadCardData(card) {
  const uid      = card.dataset.uid;
  const flightId = card.dataset.flight;
  const fromCode = card.dataset.from;
  const toCode   = card.dataset.to;
  const schedRaw = card.dataset.sched;
  const depRaw   = card.dataset.dep;
  const domInt   = card.dataset.dom;
  const panel    = document.getElementById(`auto-${uid}`);
  const arrTimeEl = document.getElementById(`arr-time-${uid}`);
  if (!panel) return;

  // Hent dest-data (Avinor) og ADS-B parallelt
  const [destResult, skyHtml] = await Promise.all([
    domInt === 'D' ? fetchDestData(flightId, toCode) : fetchDestDataSchengen(flightId, toCode),
    // ADS-B køes for å respektere rate limit
    new Promise(resolve => {
      adsbQueue = adsbQueue.then(() =>
        new Promise(r => setTimeout(r, 300))
      ).then(() =>
        fetchOpenSkyHtml(uid, flightId, fromCode, toCode, depRaw || schedRaw,
          null /* arrivalRaw settes etter dest-data er klar */)
        .then(resolve)
      );
    }),
  ]);

  // Oppdater ankomsttid i til-raden
  if (destResult?.schedRaw && arrTimeEl) {
    arrTimeEl.textContent = utcToLocal(destResult.schedRaw);
  }

  // Kjør framdrift på nytt med riktig ankomsttid
  const arrivalRaw = destResult?.schedRaw || null;
  const progressHtml = buildProgressHtml(fromCode, toCode, depRaw || schedRaw, arrivalRaw);

  const parts = [destResult?.html || '', skyHtml, progressHtml].filter(Boolean);
  panel.innerHTML = parts.join('') || '';
}

// Hent ankomstdata for Schengen/internasjonal (bare tid, gate, bånd — ingen destinfopanel)
async function fetchDestDataSchengen(flightId, destCode) {
  try {
    const otherDir = currentDir === 'D' ? 'A' : 'D';
    const xml = await fetchXML(`/XmlFeed/v1.0?airport=${destCode}&TimeFrom=4&TimeTo=25&direction=${otherDir}`);
    const match = [...xml.querySelectorAll('flight')].find(f =>
      (f.querySelector('flight_id')?.textContent || '').trim() === flightId.trim()
    );
    if (!match) return null;
    const raw = match.querySelector('status')?.getAttribute('time')
              || match.querySelector('schedule_time')?.textContent || '';
    return { html: '', schedRaw: raw };
  } catch(e) { return null; }
}

function buildProgressHtml(fromCode, toCode, depRaw, arrivalRaw) {
  if (!depRaw) return '';
  const depMs     = new Date(depRaw).getTime();
  const now       = Date.now();
  const elapsedMs = now - depMs;
  if (elapsedMs < 0) return '';

  let pct, etaStr;
  if (arrivalRaw) {
    const arrMs   = new Date(arrivalRaw).getTime();
    const totalMs = arrMs - depMs;
    if (totalMs <= 0) return '';
    pct    = Math.min(100, (elapsedMs / totalMs) * 100);
    etaStr = pct < 100
      ? new Date(arrMs).toLocaleTimeString('nb-NO', {hour:'2-digit', minute:'2-digit'})
      : null;
  } else {
    const fc = AIRPORT_COORDS[fromCode], tc = AIRPORT_COORDS[toCode];
    if (!fc || !tc) return '';
    const totalH   = haversineKm(...fc, ...tc) / 850;
    const elapsedH = elapsedMs / 3600000;
    if (elapsedH > 24) return '';
    pct    = Math.min(100, (elapsedH / totalH) * 100);
    const remH = Math.max(0, totalH - elapsedH);
    etaStr = pct < 100
      ? new Date(now + remH * 3600000).toLocaleTimeString('nb-NO', {hour:'2-digit', minute:'2-digit'})
      : null;
  }
  return progressBarHtml(pct, fromCode, toCode, etaStr);
}

async function fetchDestData(flightId, destCode) {
  try {
    const otherDir = currentDir === 'D' ? 'A' : 'D';
    const xml = await fetchXML(`/XmlFeed/v1.0?airport=${destCode}&TimeFrom=4&TimeTo=25&direction=${otherDir}`);
    const match = [...xml.querySelectorAll('flight')].find(f =>
      (f.querySelector('flight_id')?.textContent || '').trim() === flightId.trim()
    );
    if (!match) return null;

    const schedRaw     = match.querySelector('schedule_time')?.textContent || '';
    const statusEl     = match.querySelector('status');
    const otherScode   = statusEl?.getAttribute('code') || '';
    const otherStimeRaw = statusEl?.getAttribute('time') || schedRaw;
    const otherGate    = match.querySelector('gate')?.textContent || '';
    const otherBelt    = match.querySelector('belt_number')?.textContent || '';
    const otherCheckin = match.querySelector('check_in')?.textContent || '';
    const otherSi      = otherScode ? statusInfo(otherScode) : null;
    const hasMeta      = otherGate || otherBelt || otherCheckin;

    // Build small dest-meta panel (gate/belt at destination)
    let html = '';
    if (hasMeta || otherSi) {
      html += `<div class="expand-section-title">På ${airportNames[destCode] || destCode}</div>`;
      if (otherSi) html += `<span class="badge ${otherSi.cls}" style="margin-bottom:6px;display:inline-block">${otherSi.label}</span> `;
      if (hasMeta) {
        html += `<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)">
          ${otherGate    ? `<span>Gate <strong style="color:var(--text)">${otherGate}</strong></span>` : ''}
          ${otherCheckin ? `<span>Innsjekk <strong style="color:var(--text)">${otherCheckin}</strong></span>` : ''}
          ${otherBelt    ? `<span>Bagasjebånd <strong style="color:var(--text)">${otherBelt}</strong></span>` : ''}
        </div>`;
      }
    }

    return { html, schedRaw: otherStimeRaw };
  } catch(e) { return null; }
}

async function fetchOpenSkyHtml(uid, flightId, fromCode, toCode, depRaw, arrivalRaw) {
  try {
    const callsign = flightId.replace(/\s+/g, '').toUpperCase();
    const res = await fetch(`${PROXY}/adsb/v2/callsign/${encodeURIComponent(callsign)}`);

    if (res.status === 429) {
      setTimeout(() => loadedCards.delete(uid), 5000); // retry after 5s
      return '';
    }
    if (!res.ok) return '';

    const data = await res.json();
    const ac = data.ac;
    if (!ac || !ac.length) return '';

    const s = ac[0];
    const onGround = s.alt_baro === 'ground' || s.gs < 50;
    const lat      = s.lat;
    const lon      = s.lon;
    const altFt    = typeof s.alt_geom === 'number' ? Math.round(s.alt_geom)
                   : typeof s.alt_baro === 'number' ? Math.round(s.alt_baro) : null;
    const velocity = s.gs != null ? Math.round(s.gs * 1.852) : null;
    const track    = s.track != null ? Math.round(s.track) : null;
    const baroRate = s.baro_rate;
    const acType   = s.t || '';
    const reg      = s.r || '';
    const compassDir = track != null ? trackToCompass(track) : null;
    const vertLabel  = baroRate != null
      ? (baroRate > 64 ? '↑ stiger' : baroRate < -64 ? '↓ synker' : '→ cruiser')
      : null;

    if (onGround) return '';

    // Oppdater framdrift med live-posisjon
    if (lat != null && lon != null) {
      const fc = AIRPORT_COORDS[fromCode], tc = AIRPORT_COORDS[toCode];
      if (fc && tc) {
        const totalKm = haversineKm(...fc, ...tc);
        const doneKm  = haversineKm(fc[0], fc[1], lat, lon);
        const pct     = Math.min(100, (doneKm / totalKm) * 100);
        const remKm   = Math.max(0, totalKm - doneKm);
        const etaStr  = arrivalRaw
          ? new Date(arrivalRaw).toLocaleTimeString('nb-NO', {hour:'2-digit', minute:'2-digit'})
          : velocity && velocity > 100
            ? new Date(Date.now() + (remKm / velocity) * 3600000)
                .toLocaleTimeString('nb-NO', {hour:'2-digit', minute:'2-digit'})
            : null;
        // Oppdater framdriftslinjen i panelet direkte
        const panel = document.getElementById(`auto-${uid}`);
        if (panel) {
          const prog = panel.querySelector('.progress-wrap');
          if (prog) prog.outerHTML = progressBarHtml(pct, fromCode, toCode, etaStr);
        }
      }
    }

    let html = `<div class="expand-section-title">Live <span style="font-weight:400;text-transform:none;letter-spacing:0">${reg ? reg : ''}${acType ? ' · ' + acType : ''}</span></div>`;
    html += `<div class="onground-badge" style="margin-bottom:6px"><span class="dot dot-green"></span>I lufta</div>`;
    html += `<div class="live-grid">`;
    if (altFt != null)   html += `<div class="live-cell"><div class="live-cell-label">Høyde</div><div class="live-cell-value">${altFt.toLocaleString('nb-NO')}<span class="live-cell-unit">fot</span></div></div>`;
    if (velocity != null) html += `<div class="live-cell"><div class="live-cell-label">Hastighet</div><div class="live-cell-value">${velocity}<span class="live-cell-unit">km/t</span></div></div>`;
    if (compassDir)       html += `<div class="live-cell"><div class="live-cell-label">Kurs</div><div class="live-cell-value">${track}°<span class="live-cell-unit">${compassDir}</span></div></div>`;
    if (vertLabel)        html += `<div class="live-cell"><div class="live-cell-label">Fase</div><div class="live-cell-value" style="font-size:12px">${vertLabel}</div></div>`;
    html += `</div>`;
    return html;
  } catch(e) { return ''; }
}

function trackToCompass(deg) {
  const dirs = ['N','NØ','Ø','SØ','S','SV','V','NV'];
  return dirs[Math.round(deg / 45) % 8];
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function progressBarHtml(pct, fromCode, toCode, etaStr) {
  const fromName = airportNames[fromCode] || fromCode;
  const toName   = airportNames[toCode]   || toCode;
  const clampedPct = Math.max(2, Math.min(98, pct));

  return `
  <div class="expand-section-title" style="margin-top:10px">Framdrift</div>
  <div class="progress-wrap">
    <div class="progress-labels">
      <span class="progress-airport">${fromName}</span>
      <span class="progress-airport">${toName}</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${clampedPct}%"></div>
      <div class="progress-plane" style="left:calc(${clampedPct}% - 10px)">✈</div>
    </div>
    <div class="progress-pct">${Math.round(pct)}% fullført${etaStr ? ` · Est. ankomst <strong>${etaStr}</strong>` : ''}</div>
  </div>`;
}

// Generer apple-touch-icon (180x180) via canvas
(function() {
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  const r = 40;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(180-r, 0);
  ctx.quadraticCurveTo(180, 0, 180, r);
  ctx.lineTo(180, 180-r);
  ctx.quadraticCurveTo(180, 180, 180-r, 180);
  ctx.lineTo(r, 180);
  ctx.quadraticCurveTo(0, 180, 0, 180-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#185fa5';
  ctx.fill();
  ctx.font = '110px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✈', 90, 95);
  const el = document.getElementById('apple-touch-icon');
  if (el) el.href = c.toDataURL('image/png');
})();
